<div class="blurhash-container" [style.aspectRatio]="aspectRatio">
  <canvas #blurhashCanvas 
          class="blurhash-canvas"
          [class.hidden]="imageLoaded"
          [width]="width"
          [height]="height">
  </canvas>
  <picture>
    <source [srcset]="getWebpSrc()" type="image/webp">
    <img #actualImage
         [src]="src" 
         [alt]="alt"
         [class.loaded]="imageLoaded"
         (load)="onImageLoad($event)"
         class="blurhash-image">
  </picture>
</div>
