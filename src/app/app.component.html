<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<div *ngIf="dataLoaded; else noApp">
    <div class="content">
        <div *ngIf="!actionButtonClicked" class="wish-intro">
            <div class="wish-title">
                <h1>{{data?.UI?.wishHeader}}</h1>
            </div>
            <div class="wish-explanation">
                <p *ngFor="let text of data?.UI?.wishMainText">{{ text }}</p>
            </div>
            <div class="wish-action-call">{{data?.UI?.selectorActionText.va}}</div>
            <div class="selector">
                <select>
                    <option *ngFor="let option of data?.UI?.selectionOptions" [value]="option">
                        {{ option }}
                    </option>
                </select>
            </div>
            <div class="action-button">
                <button class="action-button-btn" (click)="generateWish()">{{data?.UI?.mainActionButtonText}}</button>
            </div>
            <div class="wish-intro-picture">
                <img src="{{data?.UI?.mainImageSrc}}" alt="New Year Wishes Poster" />
            </div>
        </div>

        <div *ngIf="actionButtonClicked" class="wish-result">
            <div class="wish-title">
                <h1>{{generatedWish.title}}</h1>
            </div>
            <div class="wish-text">
                {{generatedWish.text}}
            </div>
            <div class="wish-picture">
                <img src="{{generatedWish.image}}" alt="Wish Picture" />
            </div>
        </div>
    </div>
</div>
<ng-template #noApp>
    <p>Loading...</p>
</ng-template>
